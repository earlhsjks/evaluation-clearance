<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guest View | Survey Clearance System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        /* USING YOUR EXACT CSS THEME */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f9fafb;
            color: #374151;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .survey-card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
            padding: 40px 32px;
            max-width: 600px; /* Slightly wider for visitor clarity */
            width: 100%;
            text-align: center;
        }

        .survey-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #111827;
        }

        .survey-subtitle {
            color: #6b7280;
            font-size: 1rem;
            margin-bottom: 0;
        }

        /* Mock Input Style for the Live ID */
        .visitor-input-display {
            border: 2px solid #3b82f6; /* Blue border to highlight active typing */
            border-radius: 8px;
            padding: 15px;
            font-size: 2rem;
            font-weight: 700;
            background-color: #ffffff;
            color: #111827;
            min-height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-family: 'Courier New', Courier, monospace;
        }

        .status-card {
            background: #f9fafb;
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            padding: 30px 16px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .result-area .result-name {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            text-transform: uppercase;
        }

        .result-area .result-status {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            font-size: 1.5rem;
            color: #2563eb;
            margin-top: 0.5rem;
        }

        .label-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="survey-card">
        <div class="survey-header mb-4">
            <h1 class="survey-title">Survey Clearance System</h1>
            <p class="survey-subtitle">Computer Science Center</p>
        </div>

        <span class="label-text">Verifying ID:</span>
        <div id="viewLiveID" class="visitor-input-display">---</div>

        <div class="status-card">
            <div id="idleState">
                <div class="text-muted"><i class="fas fa-search me-2"></i>Waiting for entry...</div>
            </div>
            
            <div id="resultBox" class="result-area" style="display: none;">
                <div class="result-name" id="viewName">---</div>
                <div class="result-status" id="viewStatus">---</div>
            </div>
        </div>
    </div>

    <script>
        const viewLiveID = document.getElementById('viewLiveID');
        const resultBox = document.getElementById('resultBox');
        const idleState = document.getElementById('idleState');
        const viewName = document.getElementById('viewName');
        const viewStatus = document.getElementById('viewStatus');

        // Listen for storage events from your Staff Screen
        window.addEventListener('storage', (event) => {
            // Update the ID as staff types
            if (event.key === 'staff_typing_id') {
                const val = event.newValue;
                viewLiveID.innerText = val && val.trim() !== "" ? val : "---";
                
                // If staff clears input, clear the visitor's screen too
                if (!val || val.trim() === "") {
                    resetDisplay();
                }
            }

            // Update result when search is performed
            if (event.key === 'guest_display_data') {
                const data = JSON.parse(event.newValue);
                showResult(data);
            }
        });

        function showResult(data) {
            idleState.style.display = 'none';
            resultBox.style.display = 'block';
            viewName.innerText = data.name;
            viewStatus.innerText = data.status;

            // Auto-clear result after 15 seconds so screen stays fresh
            setTimeout(resetDisplay, 30000);
        }

        function resetDisplay() {
            resultBox.style.display = 'none';
            idleState.style.display = 'block';
        }
    </script>
</body>
</html>
